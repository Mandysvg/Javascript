<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Creating Javascript variables</title>
</head>
<body>
    <p id = "Morebutton"></p>
    <button onclick="thisisabutton()">More</button>
</body>

<script>
    function thisisabutton(){
        
        let name= "You have made a Reservation. Thank you.😊"
    
 
        document.getElementById("Morebutton").textContent =  ` ${name}`;
    }  
</script>
